
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Salonicco</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="progress"></div>

<nav>
<a href="prologo.html">Prologo</a>
<a href="arrivo.html">Arrivo</a>
<a href="vita.html">Vita</a>
<a href="cambiamento.html">Cambiamento</a>
<a href="ritorno.html">Ritorno</a>
</nav>

<header class="scene">
<h1>SALONICCO</h1>
<p>Film del viaggio Erasmus</p>
<a href="prologo.html"><button>Inizia</button></a>
</header>

<script>
const scenes=document.querySelectorAll(".scene");
const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("visible")});
},{threshold:0.2});
scenes.forEach(s=>obs.observe(s));

window.addEventListener("scroll",()=>{
const st=document.documentElement.scrollTop;
const h=document.documentElement.scrollHeight-window.innerHeight;
document.getElementById("progress").style.width=(st/h)*100+"%";
});
</script>

</body>
</html>
